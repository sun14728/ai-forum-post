name: AI Forum Auto Post

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      target_fids:
        description: '要发帖的板块 fid，逗号分隔；留空表示 3,4,5,6,7,8,9'
        required: false
        default: '3,4,5,6,7,8,9'

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: bot_replied.json
          key: bot-replied-${{ github.run_id }}
          restore-keys: bot-replied-
      - name: Run auto post script
        run: node auto_post.js
        env:
          NODE_ENV: production
          TARGET_FIDS: ${{ github.event.inputs.target_fids || '3,4,5,6,7,8,9' }}

      - name: Run auto reply script
        run: node bot_reply.js
        env:
          NODE_ENV: production
      - name: Save bot state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: bot_replied.json
          key: bot-replied-${{ github.run_id }}